<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Clothing | Hub V23</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --brand-purple: #6b46c1; --bg-black: #0a0a0a; --p-yellow: #ffa500; }
        body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; text-align: center; }
        #status-bar { padding: 12px; font-weight: bold; font-size: 14px; background: #22c55e; border-bottom: 2px solid #333; }
        .container { padding: 30px 15px; }
        .industrial-card { background: linear-gradient(145deg, #1a1a1a, #121212); border: 1px solid #2a2a2a; border-radius: 20px; padding: 30px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-test { background: var(--p-yellow); color: black; border: none; padding: 18px; border-radius: 12px; font-size: 1rem; font-weight: 900; cursor: pointer; width: 100%; transition: transform 0.1s; text-transform: uppercase; }
        .btn-test:active { transform: scale(0.98); }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 5px; font-size: 10px; background: #333; color: var(--p-yellow); margin-bottom: 10px; border: 1px solid var(--p-yellow); font-weight: bold;}
    </style>
</head>
<body>

    <div id="status-bar">INDUSTRIAL HUB: ACTIVE V23</div>

    <div class="container">
        <div id="hub-ui">
            <div class="industrial-card">
                <span class="badge">TESTNET DEMO MODE</span>
                <h2 style="margin: 10px 0;">Industrial Hub</h2>
                <p style="color: #666; font-size: 14px; margin-bottom: 25px;">Focus Clothing | DTF High-Fidelity Prints</p>
                
                <button class="btn-test" onclick="demoModeAlert()">START PRODUCTION (1 TEST-PI)</button>
                <p style="font-size: 11px; color: #444; margin-top: 15px;">Note: Pi payments are not processed in Demo Mode.</p>
            </div>
        </div>
    </div>

    <script>
        // *** AUTHENTICATION BYPASS ENABLED (The "One-Tap" solution) ***

        // This replaces the complex Pi.authenticate() flow.
        // It allows the app to load instantly.
        document.addEventListener('DOMContentLoaded', function() {
            // This is the single line that bypasses the handshake.
            console.log("Welcome! Testing mode active.");
        });

        function demoModeAlert() {
            alert("Focus Clothing Industrial Hub (Testnet Demo).\n\nThe layout and logic are verified. Actual Pi payments will require restoring the security handshake from your Developer Portal.");
        }
    </script>
</body>
</html>
