<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Family Marketplace</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding: 20px; margin: 0; }
        .card { background: #2d2d2d; border-radius: 15px; padding: 20px; margin: 0 auto; max-width: 500px; border: 1px solid #7a42f4; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px 0; }
        .product-card { background: #333; border-radius: 12px; padding: 10px; border: 1px solid #444; }
        .price-tag { color: #cfb2ff; font-weight: bold; display: block; margin: 5px 0; font-size: 0.9em; }
        .btn-pi { background: #7a42f4; color: white; border: none; padding: 8px; border-radius: 20px; width: 100%; cursor: pointer; font-size: 0.8em; font-weight: bold; }
        .wa-button { background: #25D366; color: white; text-decoration: none; padding: 8px; border-radius: 20px; display: block; font-size: 0.75em; margin-top: 8px; }
        .status-box { background: #111; padding: 10px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #7a42f4; text-align: left; }
    </style>
</head>
<body>

    <div class="card">
        <div class="status-box">
            <small style="color: #888;">Logged in as:</small><br>
            <span id="user-info" style="color: #7a42f4; font-weight: bold;">Loading Pi Profile...</span>
        </div>

        <h2 style="margin: 0;">Focus Marketplace</h2>
        <p style="font-size: 0.8em; color: #aaa;">Premium Chinhoyi Apparel & DTF Printing</p>

        <div class="grid">
            <div class="product-card">
                <div style="height: 120px; background: #444; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.7em;">Focus Tee</div>
                <span class="price-tag">3.14 Pi / $10</span>
                <button class="btn-pi" onclick="pay()">PAY WITH PI</button>
                <a href="https://wa.me/263712345678?text=I%20want%20the%20Focus%20Tee" class="wa-button"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
            </div>

            <div class="product-card">
                <div style="height: 120px; background: #444; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.7em;">Custom DTF</div>
                <span class="price-tag">1.00 Pi / $3</span>
                <button class="btn-pi" onclick="pay()">PAY WITH PI</button>
                <a href="https://wa.me/263712345678?text=I%20want%20Custom%20DTF%20Printing" class="wa-button"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
            </div>
        </div>

        <button onclick="auth()" style="background: transparent; color: #555; border: none; font-size: 0.7em; cursor: pointer;">Sync Account</button>
    </div>

    <script>
        Pi.init({ version: "2.0", sandbox: false });

        async function auth() {
            try {
                const user = await Pi.authenticate(['username', 'payments'], (p) => {});
                document.getElementById('user-info').innerText = user.user.username;
            } catch (err) {
                document.getElementById('user-info').innerText = "Login to Pi Browser";
            }
        }

        async function pay() {
            try {
                await Pi.createPayment({
                    amount: 3.14,
                    memo: "Focus Clothing Purchase",
                    metadata: { item: "Apparel" },
                }, {
                    onReadyForServerApproval: (id) => console.log("Approved", id),
                    onReadyForServerCompletion: (id, tx) => alert("Success!"),
                    onCancel: (id) => {},
                    onError: (e) => console.error(e),
                });
            } catch (err) { alert("Please use the Pi Browser to pay!"); }
        }

        auth();
    </script>
</body>
</html>
