<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Lab V3</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .canvas { width: 100%; aspect-ratio: 1/1; background: #111; border: 2px solid #333; border-radius: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; }
        .btn { background: #FFD60A; color: #000; border: none; padding: 20px; border-radius: 15px; font-weight: 900; width: 100%; font-size: 18px; }
        #status { color: #FFD60A; font-size: 12px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status">STATUS: CONNECTING...</div>
    <h2>INDUSTRIAL DESIGN</h2>
    <div class="canvas">PI PAYMENT ACTIVE</div>
    <button class="btn" onclick="pay()">PAY 1 TEST-PI</button>

    <script>
        const Pi = window.Pi;
        async function init() {
            try {
                await Pi.init({ version: "2.0", sandbox: true });
                const auth = await Pi.authenticate(['username', 'payments'], (p) => {});
                document.getElementById('status').innerText = "CONNECTED: " + auth.user.username.toUpperCase();
            } catch (e) { document.getElementById('status').innerText = "ERROR: REFRESH PI BROWSER"; }
        }
        init();

        async function pay() {
            Pi.createPayment({
                amount: 1.0,
                memo: "Focus Clothing Order",
                metadata: { type: "DTF" }
            }, {
                onReadyForServerApproval: async (paymentId) => {
                    document.getElementById('status').innerText = "APPROVING...";
                    // THIS PART CONNECTS TO YOUR NEW api/approve.js FOLDER
                    await fetch('/api/approve', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId })
                    });
                },
                onReadyForServerCompletion: (paymentId, txid) => {
                    alert("PAYMENT COMPLETE! TX: " + txid);
                },
                onCancel: (paymentId) => { console.log("Cancelled"); },
                onError: (error, payment) => { alert("Error: " + error.message); }
            });
        }
    </script>
</body>
</html>
