<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Family Marketplace</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding: 20px; }
        .card { background: #2d2d2d; border-radius: 15px; padding: 20px; margin: 20px auto; max-width: 400px; border: 1px solid #7a42f4; }
        button { background: #7a42f4; color: white; border: none; padding: 15px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        #user-info { color: #7a42f4; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Focus Clothing</h1>
        <p>Status: <span id="user-info">Connecting...</span></p>
        
        <div style="margin: 20px 0; height: 200px; background: #3d3d3d; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
            <p>Premium Apparel Preview</p>
        </div>

        <h3>Limited Edition "Pioneer" Tee</h3>
        <p>3.14 Pi</p>
        <button onclick="pay()">Buy Now</button>
    </div>

    <script>
        // 2. Initialize the SDK properly
        Pi.init({ version: "2.0", sandbox: false });

        async function auth() {
            try {
                const scopes = ['username', 'payments'];
                const onIncompletePaymentFound = (payment) => { /* Handle later */ };
                
                const user = await Pi.authenticate(scopes, onIncompletePaymentFound);
                document.getElementById('user-info').innerText = user.user.username;
                console.log(`Hello ${user.user.username}`);
            } catch (err) {
                document.getElementById('user-info').innerText = "Login Required";
                console.error(err);
            }
        }

        async function pay() {
            try {
                const payment = await Pi.createPayment({
                    amount: 3.14,
                    memo: "Purchase Pioneer Tee - Focus Clothing",
                    metadata: { productId: "pioneer-tee-001" },
                }, {
                    onReadyForServerApproval: (paymentId) => { console.log("Approved:", paymentId); },
                    onReadyForServerCompletion: (paymentId, txid) => { console.log("Completed:", txid); },
                    onCancel: (paymentId) => { console.log("Cancelled"); },
                    onError: (error, payment) => { console.error("Error:", error); },
                });
            } catch (err) {
                alert("Please login to the Pi Browser first!");
            }
        }

        // Run auth immediately
        auth();
    </script>
</body>
</html>
