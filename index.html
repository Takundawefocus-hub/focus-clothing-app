<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Clothing | Testnet Hub</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        #status-bar { padding: 15px; font-weight: bold; background: #222; border-bottom: 2px solid #444; }
        .online { color: #22c55e; border-bottom-color: #22c55e !important; }
        .offline { color: #ef4444; border-bottom-color: #ef4444 !important; }
        .container { padding: 40px 20px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .btn-test { background: #ffa500; color: black; border: none; padding: 18px; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="status-bar">CONNECTING...</div>

    <div class="container">
        <div id="user-info" style="color: #888; margin-bottom: 20px;">Checking Pi Browser Auth...</div>

        <div id="hub-ui" style="display:none;">
            <div class="card">
                <h2 style="margin-top:0;">Focus Industrial Hub</h2>
                <p style="color: #666;">High-Fidelity DTF Testing</p>
                <button class="btn-test" onclick="payOneTestPi()">SEND 1 TEST PI</button>
            </div>
        </div>
    </div>

    <script>
        const statusBar = document.getElementById('status-bar');
        const hubUI = document.getElementById('hub-ui');
        const userDisplay = document.getElementById('user-info');

        // 1. Initialize for TESTNET (sandbox: true)
        if (window.Pi) {
            window.Pi.init({ version: "2.0", sandbox: true });

            window.Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
            .then(function(auth) {
                statusBar.innerText = "ONLINE: TESTNET";
                statusBar.className = "online";
                userDisplay.innerText = "Logged in as: " + auth.user.username;
                hubUI.style.display = "block";
            })
            .catch(function(err) {
                statusBar.innerText = "ACCESS DENIED: REFRESH BROWSER";
                statusBar.className = "offline";
            });
        }

        // 2. Testnet Payment
        function payOneTestPi() {
            window.Pi.createPayment({
                amount: 1,
                memo: "DTF Test - Focus Clothing",
                metadata: { order: "test_001" }
            }, {
                onReadyForServerApproval: (pid) => console.log("Approval ID:", pid),
                onReadyForServerCompletion: (pid, txid) => alert("Success! TxID: " + txid),
                onCancel: (pid) => console.log("Cancelled"),
                onError: (err) => alert("Error: Make sure you have Test Pi in your wallet.")
            });
        }

        // 3. Cleanup Stuck Payments
        function onIncompletePaymentFound(payment) {
            console.log("Cleaning up incomplete payment:", payment.identifier);
        }
    </script>
</body>
</html>
