<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Focus Clothing V23</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --ios-bg: #000; --ios-card: #1C1C1E; --ios-gold: #FFD60A;
            --ios-label: #FFF; --ios-secondary: #8E8E93; --ios-border: #38383A;
        }
        body { background: var(--ios-bg); color: var(--ios-label); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding-bottom: 80px; }

        /* UI Header */
        header { padding: 50px 20px 20px; border-bottom: 1px solid var(--ios-border); background: rgba(28,28,30,0.8); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; }
        h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -1px; }

        /* Navigation Views */
        .view { display: none; padding: 20px; }
        .view.active { display: block; }

        /* Industrial Components */
        .card { background: var(--ios-card); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--ios-border); }
        .btn { background: var(--ios-gold); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; font-size: 16px; margin-top: 10px; }

        /* FIXED DESIGN CANVAS (No External Images) */
        .canvas-container { 
            width: 100%; aspect-ratio: 1/1; background: #111; 
            border: 2px solid var(--ios-border); border-radius: 12px;
            position: relative; overflow: hidden; display: flex;
            align-items: center; justify-content: center;
        }
        .canvas-label { color: #333; font-weight: 900; font-size: 30px; position: absolute; pointer-events: none; }
        #user-image-preview { position: absolute; max-width: 80%; max-height: 80%; z-index: 10; display: none; border: 1px dashed var(--ios-gold); }

        /* Tab Bar */
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #1C1C1E; border-top: 1px solid var(--ios-border); display: flex; justify-content: space-around; align-items: center; padding-bottom: 10px; }
        .nav-btn { color: var(--ios-secondary); font-size: 11px; font-weight: 600; text-align: center; cursor: pointer; border: none; background: none; }
        .nav-btn.active { color: var(--ios-gold); }
    </style>
</head>
<body>

    <header>
        <h1>FOCUS V23</h1>
        <small style="color: var(--ios-gold); font-weight: 700;">INDUSTRIAL ECOSYSTEM</small>
    </header>

    <div id="home" class="view active">
        <div class="card">
            <h2 style="margin-top:0;">Manufacturing</h2>
            <p style="color:var(--ios-secondary);">Create high-fidelity DTF Gang Sheets for 1 Test-Pi.</p>
            <button class="btn" onclick="showTab('lab')">START DESIGN</button>
        </div>
    </div>

    <div id="lab" class="view">
        <div class="canvas-container">
            <div class="canvas-label">PLACEMENT</div>
            <img id="user-image-preview" src="">
        </div>
        
        <input type="file" id="imageInput" hidden accept="image/*" onchange="previewImage(event)">
        <button class="btn" style="background: #333; color: #fff;" onclick="document.getElementById('imageInput').click()">UPLOAD LOGO</button>
        <button class="btn" onclick="initPayment()">PAY 1 TEST-PI</button>
    </div>

    <div id="account" class="view">
        <div class="card">
            <h2>Account Details</h2>
            <p style="color:var(--ios-secondary);">Rank: Apprentice Printer</p>
            <hr border="0" style="border-top:1px solid #333; margin: 15px 0;">
            <p>Order History: 0</p>
        </div>
    </div>

    <nav>
        <button class="nav-btn active" id="btn-home" onclick="showTab('home')">HOME</button>
        <button class="nav-btn" id="btn-lab" onclick="showTab('lab')">DESIGN</button>
        <button class="nav-btn" id="btn-account" onclick="showTab('account')">ACCOUNT</button>
    </nav>

    <script>
        // Tab System
        function showTab(tabId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
        }

        // Image Preview
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function(){
                const output = document.getElementById('user-image-preview');
                output.src = reader.result;
                output.style.display = 'block';
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        // Payment logic
        function initPayment() {
            if (!window.Pi) {
                alert("Please open this inside the Pi Browser.");
                return;
            }
            window.Pi.createPayment({
                amount: 1.0,
                memo: "Focus DTF Print Order",
                metadata: { type: "A3_GANG_SHEET" }
            }, {
                onReadyForServerApproval: (id) => alert("Order Sent: " + id),
                onReadyForServerCompletion: () => alert("Payment Success! Printing started."),
                onError: (err) => alert("Error: App not registered in Develop portal.")
            });
        }
    </script>
</body>
</html>
