<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Focus Clothing | Design Lab V23</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1C1C1E;
            --ios-gold: #FFD60A;
            --ios-label: #FFFFFF;
            --ios-secondary: #8E8E93;
            --ios-border: #38383A;
            --native-font: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body { 
            background-color: var(--ios-bg); color: var(--ios-label); 
            font-family: var(--native-font); margin: 0; overflow-x: hidden; 
        }

        .container { padding: 20px 20px 100px 20px; }
        .ios-card { 
            background: var(--ios-card); border-radius: 15px; padding: 20px; 
            margin-bottom: 20px; border: 1px solid var(--ios-border); 
        }

        /* DESIGN LAB OVERLAY */
        #design-lab {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 3000; padding-top: 50px; text-align: center;
        }

        /* THE MOCKUP CANVAS */
        #mockup-container {
            position: relative; width: 300px; height: 350px; 
            background: url('https://i.ibb.co/F8D84s6/V23-Matte-Utility-Render.webp') center/cover;
            margin: 0 auto; border-radius: 10px; border: 2px solid var(--ios-border);
            overflow: hidden;
        }

        #user-upload-preview {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            max-width: 120px; max-height: 120px; pointer-events: none; opacity: 0.9;
        }

        .btn-gold { 
            background: var(--ios-gold); color: #000; border: none; padding: 15px; 
            border-radius: 10px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 20px;
        }

        input[type="file"] { display: none; }
        .custom-file-upload {
            display: inline-block; padding: 12px 24px; cursor: pointer;
            background: #333; border-radius: 10px; font-weight: 600; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="design-lab">
        <h2 style="margin-top:0;">INDUSTRIAL DESIGN LAB</h2>
        <p style="color:var(--ios-secondary); font-size:13px;">Upload your artwork (PNG/High-Res)</p>
        
        <div id="mockup-container">
            <img id="user-upload-preview" src="" style="display:none;">
        </div>

        <label class="custom-file-upload">
            <input type="file" accept="image/*" onchange="previewImage(event)">
            CHOOSE ARTWORK
        </label>

        <div style="padding:0 40px;">
            <button class="btn-gold" onclick="alert('Proceed to Pi Wallet for 1 Test-Pi?')">APPROVE & PAY (1 Pi)</button>
            <button onclick="closeLab()" style="background:none; border:none; color:var(--ios-secondary); margin-top:20px; cursor:pointer;">Exit Lab</button>
        </div>
    </div>

    <div class="container" id="home-view">
        <h1 style="font-weight:800; letter-spacing:-1px;">FOCUS HUB</h1>
        
        <div class="ios-card">
            <h3 style="margin:0;">Manufacturing</h3>
            <p style="color:var(--ios-secondary); font-size:14px; margin: 5px 0 20px 0;">Start a custom DTF Gang Sheet order.</p>
            <button class="btn-gold" onclick="openLab()">OPEN DESIGN LAB</button>
        </div>

        <div class="ios-card" style="background: #111;">
            <p style="font-size:12px; color:var(--ios-secondary);">CURRENT BALANCE</p>
            <h2 style="margin:0;">24.50 <span style="color:var(--ios-gold);">π</span></h2>
        </div>
    </div>

    <script>
        function openLab() { document.getElementById('design-lab').style.display = 'block'; }
        function closeLab() { document.getElementById('design-lab').style.display = 'none'; }

        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById('user-upload-preview');
                output.src = reader.result;
                output.style.display = 'block';
            };
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
</body>
</html>
