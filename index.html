<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Clothing | Industrial Hub</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --brand-purple: #6b46c1; --bg-black: #0a0a0a; }
        body { background-color: var(--bg-black); color: white; font-family: 'Inter', sans-serif; margin: 0; text-align: center; }
        #status-bar { padding: 15px; font-weight: bold; background: #333; transition: background 0.3s; }
        .online { background: #22c55e !important; }
        .offline { background: #ef4444 !important; }
        .container { padding: 40px 20px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 25px; margin-top: 20px; }
        .btn-pay { background: white; color: black; border: none; padding: 18px 40px; border-radius: 10px; font-size: 1.1rem; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="status-bar">INITIALIZING CONNECTION...</div>

    <div class="container">
        <h1>Focus Clothing</h1>
        <div id="user-display">Please sign in via Pi Browser</div>

        <div id="hub-content" style="display:none;">
            <div class="card">
                <h3>Industrial Hub: DTF Printing</h3>
                <p style="color: #aaa;">High-Fidelity Production Queue</p>
                <hr style="border: 0.5px solid #333; margin: 20px 0;">
                <button class="btn-pay" onclick="payWithPi()">Quick Start (1 Pi)</button>
            </div>
        </div>
    </div>

    <script>
        const status = document.getElementById('status-bar');
        const hub = document.getElementById('hub-content');
        const userText = document.getElementById('user-display');

        // 1. Initialize SDK
        if (window.Pi) {
            window.Pi.init({ version: "2.0", sandbox: false });

            // 2. Clear out other listeners and force Pi Auth
            window.Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
            .then(function(auth) {
                status.innerText = "SYSTEM LIVE";
                status.className = "online";
                userText.innerText = "Welcome back, " + auth.user.username;
                hub.style.display = "block";
            })
            .catch(function(err) {
                status.innerText = "ACCESS DENIED: OPEN IN PI BROWSER";
                status.className = "offline";
                console.error(err);
            });
        }

        // 3. Simple 1-Pi Payment Logic
        function payWithPi() {
            window.Pi.createPayment({
                amount: 1,
                memo: "Industrial DTF Print - Focus Clothing",
                metadata: { type: "DTF_Production" }
            }, {
                onReadyForServerApproval: (pid) => console.log("Approval pending:", pid),
                onReadyForServerCompletion: (pid, txid) => {
                    alert("Payment Success! Transaction: " + txid);
                },
                onCancel: (pid) => console.log("Payment Cancelled"),
                onError: (err) => alert("Payment Error: Check your Pi Balance")
            });
        }

        function onIncompletePaymentFound(payment) {
            // Automatically cleans up any "stuck" 1 Pi transactions
            console.log("Resolving incomplete payment...", payment.identifier);
        }
    </script>
</body>
</html>
