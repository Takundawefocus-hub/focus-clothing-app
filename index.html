<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Clothing | Testnet Hub</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --p-yellow: #ffa500; --bg-black: #0d0d0d; }
        body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; text-align: center; }
        #status-bar { padding: 12px; font-weight: bold; letter-spacing: 1px; font-size: 14px; background: #222; border-bottom: 1px solid #333; }
        .online { color: #22c55e; border-bottom: 2px solid #22c55e !important; }
        .offline { color: #ef4444; border-bottom: 2px solid #ef4444 !important; }
        .container { padding: 30px 15px; }
        .industrial-card { background: linear-gradient(145deg, #1a1a1a, #121212); border: 1px solid #2a2a2a; border-radius: 20px; padding: 30px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-test { background: var(--p-yellow); color: black; border: none; padding: 18px; border-radius: 12px; font-size: 1rem; font-weight: 900; cursor: pointer; width: 100%; transition: transform 0.1s; }
        .btn-test:active { transform: scale(0.98); }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 5px; font-size: 10px; background: #333; color: var(--p-yellow); margin-bottom: 10px; border: 1px solid var(--p-yellow); }
    </style>
</head>
<body>

    <div id="status-bar">NETWORK: DISCONNECTED</div>

    <div class="container">
        <div id="user-info" style="margin-bottom: 20px; color: #888; font-size: 14px;">Awaiting Pi Browser authentication...</div>

        <div id="hub-ui" style="display:none;">
            <div class="industrial-card">
                <span class="badge">PROTOCOL V23 TESTNET</span>
                <h2 style="margin: 10px 0;">Industrial Hub</h2>
                <p style="color: #666; font-size: 14px; margin-bottom: 25px;">Ready for High-Fidelity DTF Testing</p>
                
                <button class="btn-test" onclick="requestTestPayment()">SEND 1 TEST-PI</button>
                <p style="font-size: 11px; color: #444; margin-top: 15px;">No real Pi will be deducted in Testnet mode.</p>
            </div>
        </div>
    </div>

    <script>
        const statusBar = document.getElementById('status-bar');
        const hubUI = document.getElementById('hub-ui');
        const userDisplay = document.getElementById('user-info');

        // 1. Initialize for TESTNET (Matches your Portal screenshot)
        if (window.Pi) {
            window.Pi.init({ version: "2.0", sandbox: true });

            window.Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
            .then(function(auth) {
                statusBar.innerText = "NETWORK: TESTNET LIVE";
                statusBar.className = "online";
                userDisplay.innerText = "Operator: " + auth.user.username;
                hubUI.style.display = "block";
            })
            .catch(function(err) {
                statusBar.innerText = "ERROR: USE PI BROWSER";
                statusBar.className = "offline";
                console.error("Auth Error:", err);
            });
        }

        // 2. Testnet Payment Trigger
        function requestTestPayment() {
            window.Pi.createPayment({
                amount: 1,
                memo: "DTF Production Test - Focus Clothing",
                metadata: { orderId: "TEST_DTF_001" }
            }, {
                onReadyForServerApproval: (pid) => {
                    console.log("Approval required for ID:", pid);
                },
                onReadyForServerCompletion: (pid, txid) => {
                    alert("Test Successful!\nTxID: " + txid);
                },
                onCancel: (pid) => console.log("Test Cancelled"),
                onError: (err) => alert("Test Failed: Ensure you have Test-Pi in your wallet.")
            });
        }

        // 3. MANDATORY Protocol 23 Cleanup
        function onIncompletePaymentFound(payment) {
            console.log("Found an unclosed test transaction:", payment.identifier);
            // This prevents the "Offline" lock you experienced earlier.
        }
    </script>
</body>
</html>
